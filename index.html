<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INKTIDE</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- header -->
    <header>
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🌊</span>
                <span class="logo-text">INKTIDE</span>
            </div>
            <nav class="header-actions">
                <button class="nav-btn" id="myListBtn">📋 My List<span class="header-badge"
                        id="listCount">0</span></button>
                <button class="nav-btn" id="favBtn">❤️ Favorites<span class="header-badge"
                        id="listCount">0</span></button>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
            </nav>
        </div>
    </header>


    <!-- main hero-->
    <section class="hero">
        <div class="hero-inner">
            <div class="hero-badge">✦ 70,000+ Free Books — No Sign Up Required</div>
            <h1 class="hero-title">Read &amp; Download <span>Free Books</span></h1>
            <p class="hero-sub">Classic literature, philosophy, science — read in-app or download ePub &amp; PDF
                instantly.
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search title, author, or subject..."
                    autocomplete="off" />
            </div>

            <div class="hero-stats">
                <span>📖 Read Online</span>
                <span>⬇️ Download ePub</span>
                <span>📄 Download PDF</span>
            </div>
        </div>

    </section>

    <!-- control bar -->
    <div class="controls-bar">
        <div class="controls-inner">
            <span id="resultsInfo" class="results-info">Loading…</span>
            <div class="controls-group">
                <!-- Filter -->
                <div class="control-wrap">
                    <label for="filterSelect">🗂 Genre</label>
                    <select id="filterSelect">
                        <option value="all">All Genres</option>
                        <option value="fiction">Fiction</option>
                        <option value="science">Science</option>
                        <option value="history">History</option>
                        <option value="philosophy">Philosophy</option>
                        <option value="poetry">Poetry</option>
                        <option value="adventure">Adventure</option>
                        <option value="romance">Romance</option>
                        <option value="drama">Drama</option>
                    </select>
                </div>
                <!-- Sort -->
                <div class="control-wrap">
                    <label for="sortSelect">↕ Sort</label>
                    <select id="sortSelect">
                        <option value="default">Default</option>
                        <option value="title_asc">Title A → Z</option>
                        <option value="title_desc">Title Z → A</option>
                        <option value="author_asc">Author A → Z</option>
                        <option value="downloads_desc">Most Downloaded</option>
                    </select>
                </div>
            </div>
        </div>
    </div>


    <!-- loading -->

    <div id="loading" style="display:none;">
        <div class="spinner"></div>
        <p>Fetching books...</p>
    </div>

    <section class="books-container">


    </section>

    <footer>
        <button class="pagebtn" id="previous">← Prev</button>
        <div id="page-no">1</div>
        <button id="next" class="pagebtn">Next →</button>
    </footer>

    <script src="./script.js"></script>
</body>

</html>
